services:
  db:
    image: postgres:15-alpine
    container_name: sportbooker-postgres
    environment:
      POSTGRES_DB: sportbooker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sportbooker"]
      interval: 2s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sportbooker-app
    env_file: .env.docker
    environment:
      DB_HOST: db
    ports:
      - "3000:3000"
    volumes:
      - ./database/migrations:/app/database/migrations:ro
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sportbooker-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
